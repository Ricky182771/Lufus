app-id: io.github.lufus.Lufus
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk

command: Lufus

# ──────────────────────────────────────────────────────────────────────────────
# Sandbox permissions
# ──────────────────────────────────────────────────────────────────────────────
finish-args:
  # Display (Wayland primary, X11 fallback)
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11

  # USB and block device access — required for writing ISO images to drives.
  - --device=all

  # ISO file selection from the user's home directory
  - --filesystem=home

  # UDisks2 loop mount paths
  - --filesystem=/run/media
  - --filesystem=/media

  # Temporary files
  - --filesystem=/tmp

  # Polkit for privilege escalation
  - --system-talk-name=org.freedesktop.PolicyKit1

  # UDisks2 for device monitoring, enumeration, and writing
  - --system-talk-name=org.freedesktop.UDisks2

# ──────────────────────────────────────────────────────────────────────────────
# Build options
# ──────────────────────────────────────────────────────────────────────────────
build-options:
  cflags: -O2
  cxxflags: -O2

# Remove development artifacts from the final image
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - /share/doc
  - '*.la'
  - '*.a'

# ──────────────────────────────────────────────────────────────────────────────
# Modules
# ──────────────────────────────────────────────────────────────────────────────
modules:

  # ── util-linux (libfdisk + libuuid) ──────────────────────────────────────
  - name: util-linux
    buildsystem: autotools
    config-opts:
      - --disable-all-programs
      - --enable-libfdisk
      - --enable-libblkid
      - --enable-libuuid
      - --without-python
      - --disable-libmount
      - --without-ncurses
      - --without-readline
    sources:
      - type: archive
        url: https://mirrors.edge.kernel.org/pub/linux/utils/util-linux/v2.40/util-linux-2.40.4.tar.gz
        sha256: 5b3b1435c02ba201ebaa5066bb391965a614b61721155dfb7f7b6569e95b0627

  # ── wimlib ───────────────────────────────────────────────────────────────
  - name: wimlib
    buildsystem: autotools
    config-opts:
      - --without-fuse
      - --without-ntfs-3g
      - --disable-tests
    sources:
      - type: archive
        url: https://wimlib.net/downloads/wimlib-1.14.4.tar.gz
        sha256: 3633db2b6c8b255eb86d3bf3df3059796bd1f08e50b8c9728c7eb66662e51300

  # ── Lufus ────────────────────────────────────────────────────────────────
  - name: lufus
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: archive
        url: https://github.com/Ricky182771/Lufus/archive/refs/tags/v1.0.0.tar.gz
        sha256: e5c4703e10b36cf4f30b6ed968f311aa99a952365632b9f6ea5ab8d14c1cba60
