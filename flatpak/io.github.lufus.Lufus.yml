app-id: io.github.lufus.Lufus
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk

command: Lufus

# ──────────────────────────────────────────────────────────────────────────────
# Sandbox permissions
# ──────────────────────────────────────────────────────────────────────────────
finish-args:
  # Display (Wayland primary, X11 fallback)
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11

  # USB and block device access — required for writing ISO images to drives.
  # NOTE: This app uses pkexec for privilege escalation. For a fully sandboxed
  # Flatpak, consider migrating to the UDisks2 D-Bus API instead of pkexec.
  - --device=all

  # ISO file selection from the user's home directory
  - --filesystem=home

  # Temporary JSON config file written before launching the backend helper
  - --filesystem=/tmp

  # UDisks2 manages all privileged disk operations and handles Polkit auth internally.
  - --system-talk-name=org.freedesktop.UDisks2

# ──────────────────────────────────────────────────────────────────────────────
# Build options
# ──────────────────────────────────────────────────────────────────────────────
build-options:
  cflags: -O2
  cxxflags: -O2

# Remove development artifacts from the final image
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - /share/doc
  - '*.la'
  - '*.a'

# ──────────────────────────────────────────────────────────────────────────────
# Modules
# ──────────────────────────────────────────────────────────────────────────────
modules:

  # ── Lufus ────────────────────────────────────────────────────────────────
  - name: lufus
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    # For local development, build directly from the repo root.
    # For Flathub submission, replace with a git/archive source + sha256.
    sources:
      - type: dir
        path: ..

# ──────────────────────────────────────────────────────────────────────────────
# Notes for Flathub submission
# ──────────────────────────────────────────────────────────────────────────────
# 1. Replace `type: dir` with a tagged git commit or release tarball + sha256.
# 2. Privileged disk operations are fully delegated to UDisks2 via D-Bus.
#    No pkexec or helper process is needed. Authentication dialogs come from
#    UDisks2's own Polkit actions (org.freedesktop.udisks2.*).
# 3. The polkit policy in /app/share/polkit-1/actions/ is retained for
#    documentation but is not required for runtime operation.
