app-id: io.github.lufus.Lufus
runtime: org.kde.Platform
runtime-version: '6.8'
sdk: org.kde.Sdk

command: Lufus

# ──────────────────────────────────────────────────────────────────────────────
# Sandbox permissions
# ──────────────────────────────────────────────────────────────────────────────
finish-args:
  # Display (Wayland primary, X11 fallback)
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11

  # USB and block device access — required for writing ISO images to drives.
  # NOTE: This app uses pkexec for privilege escalation. For a fully sandboxed
  # Flatpak, consider migrating to the UDisks2 D-Bus API instead of pkexec.
  - --device=all
  - --filesystem=home
  - --filesystem=/tmp
  - --filesystem=/run/media
  - --filesystem=/media
  # UDisks2 manages all privileged disk operations and handles Polkit auth internally.
  - --system-talk-name=org.freedesktop.UDisks2

# ──────────────────────────────────────────────────────────────────────────────
# Build options
# ──────────────────────────────────────────────────────────────────────────────
build-options:
  cflags: -O2
  cxxflags: -O2

# Remove development artifacts from the final image
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/man
  - /share/doc
  - '*.la'
  - '*.a'

# ──────────────────────────────────────────────────────────────────────────────
# Modules
# ──────────────────────────────────────────────────────────────────────────────
modules:


  # ── util-linux ──────────────────────────────────────────
  - name: util-linux
    buildsystem: autotools
    config-opts:
      - --disable-all-programs
      - --enable-libfdisk
      - --enable-libblkid
      - --enable-libuuid
      - --without-python
      - --disable-libmount
      - --without-ncurses
      - --without-readline
    sources:
      - type: archive
        url: https://mirrors.edge.kernel.org/pub/linux/utils/util-linux/v2.40/util-linux-2.40.4.tar.gz
        sha256: 5b3b1435c02ba201ebaa5066bb391965a614b61721155dfb7f7b6569e95b0627

  # ── wimlib ───────────────────────────────────────────────────────────────
  - name: wimlib
    buildsystem: autotools
    config-opts:
      - --without-fuse
      - --without-ntfs-3g
      - --disable-tests
    sources:
      - type: archive
        url: https://wimlib.net/downloads/wimlib-1.14.4.tar.gz
        sha256: 3633db2b6c8b255eb86d3bf3df3059796bd1f08e50b8c9728c7eb66662e51300
  # ── Lufus ────────────────────────────────────────────────────────────────
  - name: lufus
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    # For local development, build directly from the repo root.
    # For Flathub submission, replace with a git/archive source + sha256.
    sources:
      - type: dir
        path: ..

# ──────────────────────────────────────────────────────────────────────────────
# Notes for Flathub submission
# ──────────────────────────────────────────────────────────────────────────────
# 1. Replace `type: dir` with a tagged git commit or release tarball + sha256.
# 2. Privileged disk operations are fully delegated to UDisks2 via D-Bus.
#    No pkexec or helper process is needed. Authentication dialogs come from
#    UDisks2's own Polkit actions (org.freedesktop.udisks2.*).
# 3. The polkit policy in /app/share/polkit-1/actions/ is retained for
#    documentation but is not required for runtime operation.
